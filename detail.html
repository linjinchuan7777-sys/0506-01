<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber2K | 螢光金屬外套</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="glass">
        <div class="logo">Cyber2K</div>
        <div class="nav-links">
            <a href="index.html">首頁</a>
            <a href="list.html">所有商品</a>
            <a href="#">關於我們</a>
            <a href="#">購物車</a>
        </div>
    </nav>

    <section style="margin-top: 100px;">
        <div class="detail-container">
            <div class="detail-img-gallery">
                <img src="assets/crop_top.png" alt="螢光金屬外套" class="main-img">
                <div class="thumbnails">
                    <div class="thumb active"></div>
                    <div class="thumb"></div>
                    <div class="thumb"></div>
                </div>
            </div>

            <div class="detail-info">
                <h1>螢光金屬外套</h1>
                <p class="detail-price">$2,480</p>
                <p class="detail-desc">
                    這款外套採用 2000s 經典的科技亮面布料，具備未來感的金屬光澤。
                    修身剪裁與螢光元素讓你在數位世界中脫穎而出。
                    100% 科技聚酯纖維，透氣且耐穿。
                </p>

                <div class="selectors">
                    <div class="selector-group">
                        <h4>尺寸 (Size)</h4>
                        <button class="bubble-btn">S</button>
                        <button class="bubble-btn active">M</button>
                        <button class="bubble-btn">L</button>
                    </div>

                    <div class="selector-group">
                        <h4>顏色 (Color)</h4>
                        <button class="bubble-btn active">螢光粉</button>
                        <button class="bubble-btn">電子藍</button>
                        <button class="bubble-btn">液態銀</button>
                    </div>
                </div>

                <button class="cta-button add-to-cart">加入購物車</button>
                <button class="cta-button" style="width: 100%; background: transparent; border: 1px solid white; color: white;">立即購買</button>
            </div>
        </div>
    </section>

    <section id="related">
        <h2 class="section-title">推薦搭配</h2>
        <div class="product-grid">
            <div class="product-card glass" onclick="window.location.href='detail.html'">
                <div class="product-img" style="background-image: url('assets/skirt.png'); background-size: cover;"></div>
                <div class="product-info">
                    <h3>液態銀色迷你裙</h3>
                    <p class="price">$1,280</p>
                </div>
            </div>
            <div class="product-card glass" onclick="window.location.href='detail.html'">
                <div class="product-img" style="background-image: url('assets/boots.png'); background-size: cover;"></div>
                <div class="product-info">
                    <h3>科技感厚底靴</h3>
                    <p class="price">$3,280</p>
                </div>
            </div>
            <div class="product-card glass" onclick="window.location.href='detail.html'">
                <div class="product-img" style="background-image: url('assets/jacket.png'); background-size: cover;"></div>
                <div class="product-info">
                    <h3>螢光金屬外套</h3>
                    <p class="price">$2,480</p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Cyber2K. All Rights Reserved. 繁體中文版</p>
    </footer>

</body>
</html>
